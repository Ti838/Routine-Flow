<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - Routine Flow</title>
    <link rel="icon" type="image/png" href="../favicon.png">

    <!-- CSS Files -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>
    <!-- Navbar -->
    <div id="navbarContainer"></div>

    <!-- Sidebar -->
    <div id="sidebarContainer"></div>

    <!-- Main Content -->
    <main class="main-content with-sidebar">
        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Edit User</h1>
                <p class="page-description">Update user information</p>
            </div>
            <a href="users.html" class="btn btn-secondary">← Back to Users</a>
        </div>

        <!-- Edit User Form -->
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="card-body">
                <form id="editUserForm" onsubmit="handleUpdateUser(event)">
                    <div class="form-group">
                        <label class="form-label">User ID (Read-only)</label>
                        <input type="text" class="form-input" id="userId" readonly
                            style="background-color: var(--light-bg); cursor: not-allowed;">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-input" id="name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email (Read-only)</label>
                        <input type="email" class="form-input" id="email" readonly
                            style="background-color: var(--light-bg); cursor: not-allowed;">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Role</label>
                        <select class="form-select" id="role" required>
                            <option value="Admin">Admin</option>
                            <option value="Teacher">Teacher</option>
                            <option value="Student">Student</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Department</label>
                        <select class="form-select" id="department" required>
                            <option value="">Select Department</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Gender</label>
                        <select class="form-select" id="gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="action-buttons">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="users.html" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footerContainer"></div>

    <!-- JavaScript Files -->
    <script src="../js/utils.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/components.js"></script>

    <script>
        // Check authentication and authorization
        requireAuth();
        const currentUser = getCurrentUser();

        if (!hasRole('Admin')) {
            alert('Access denied. Admin access required.');
            redirectToDashboard(currentUser.role);
        }

        // Load navbar and sidebar
        document.getElementById('navbarContainer').innerHTML = generateNavbar(currentUser);
        document.getElementById('sidebarContainer').innerHTML = generateSidebar('Admin');
        document.getElementById('footerContainer').innerHTML = generateFooter();
        document.querySelector('.main-footer').classList.add('with-sidebar');
        setActiveNavLink('/admin/users.html');

        // Get user ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        if (!userId) {
            alert('No user specified');
            window.location.href = 'users.html';
        }

        // Load departments
        function loadDepartments() {
            const departments = getAllDepartments();
            const options = departments.map(dept =>
                `<option value="${dept}">${dept}</option>`
            ).join('');

            document.getElementById('department').innerHTML = '<option value="">Select Department</option>' + options;
        }

        // Load user data
        function loadUserData() {
            const user = getUserById(userId);

            if (!user) {
                alert('User not found');
                window.location.href = 'users.html';
                return;
            }

            document.getElementById('userId').value = user.userId;
            document.getElementById('name').value = user.name;
            document.getElementById('email').value = user.email;
            document.getElementById('role').value = user.role;
            document.getElementById('department').value = user.department;
            document.getElementById('gender').value = user.gender;
        }

        // Handle update user
        function handleUpdateUser(event) {
            event.preventDefault();

            const updatedData = {
                name: document.getElementById('name').value,
                role: document.getElementById('role').value,
                department: document.getElementById('department').value,
                gender: document.getElementById('gender').value
            };

            const result = updateUser(userId, updatedData);

            if (result) {
                showToast('User updated successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'users.html';
                }, 1000);
            } else {
                showToast('Failed to update user', 'error');
            }
        }

        // Initialize
        loadDepartments();
        loadUserData();
    </script>
</body>

</html>
